services:
  docs:
    build:
      context: ./docs
      dockerfile: Dockerfile
    ports:
      - "3080:80"

  juglans:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./workspace:/workspace
    environment:
      - JUG0_BASE_URL=${JUG0_BASE_URL:-http://localhost:3000}
      - JUG0_API_KEY=${JUG0_API_KEY:-}
