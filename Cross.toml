# Cross.toml - Configuration for cross-compilation
# https://github.com/cross-rs/cross

[build.env]
passthrough = [
    "RUST_BACKTRACE",
    "RUST_LOG",
]

[target.aarch64-unknown-linux-gnu]
image = "ghcr.io/cross-rs/aarch64-unknown-linux-gnu:main"
pre-build = [
    "dpkg --add-architecture arm64",
    "apt-get update && apt-get install -y libwayland-dev:arm64 libxkbcommon-dev:arm64 libx11-dev:arm64 libxtst-dev:arm64 libxi-dev:arm64 libxdo-dev:arm64 libxcb-randr0-dev:arm64 libxcb-shm0-dev:arm64 libxcb-shape0-dev:arm64 libxcb-xfixes0-dev:arm64 libegl-dev:arm64 libgbm-dev:arm64",
]
